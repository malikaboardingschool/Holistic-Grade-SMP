        if (students.length === 0) return;
        if (currentIndex > 0) {
          setSelectedStudentId(students[currentIndex - 1].id);
        } else {
          setSelectedStudentId(students[students.length - 1].id);
        }
      };

      const handleNext = () => {
        if (students.length === 0) return;
        if (currentIndex < students.length - 1) {
          setSelectedStudentId(students[currentIndex + 1].id);
        } else {
          setSelectedStudentId(students[0].id);
        }
      };

      const handleSaveStudent = (studentData) => {
        const studentId = isAddingNew ? Date.now().toString() : studentData.id;

          ...studentData,
          id: studentId,
          sas: Number(studentData.sas) || 85,
          sat: Number(studentData.sat) || 88,
          tahfizh_juz: Number(studentData.tahfizh_juz) || 0
        };

        if (isAddingNew) {
          setStudents([...students, updatedPayload]);
          setSelectedStudentId(studentId);
        } else {
          setStudents(students.map(s => s.id === studentData.id ? updatedPayload : s));
        }

        setEditingStudent(null);
        setIsAddingNew(false);
        triggerAlert(`Data rapor ananda ${studentData.nama} berhasil disimpan!`, "Sukses Menyimpan");

      // Menghapus data santriwati dari state lokal

          const updated = students.filter(s => s.id !== id);

          triggerAlert("Data santriwati berhasil dihapus.", "Sukses Terhapus");
          
          if (updated.length > 0) {
            if (String(selectedStudentId) === String(id)) {
              setSelectedStudentId(updated[0].id);
            }
          } else {
            setSelectedStudentId("");
          }
        });
      };

      // Download Data Excel / CSV dengan 10 kolom presisi
      const handleDownloadExcel = () => {
        if (students.length === 0) {
          triggerAlert("Tidak ada data siswa untuk diunduh.", "Data Kosong");
          return;
        }

        const headers = [
          "Nama Santri", 
          "NIS / Kelas", 
          "Perkembangan Nyata", 
          "Tahfizh Al-Qur'an", 
          "Ibadah Harian", 
          "Sikap & Disiplin", 
          "Kepemimpinan & Sosial", 
          "Prestasi Non-Akademik", 
          "Fokus Peningkatan & Target Selanjutnya", 
          "Pesan Wali Kelas & Wali Kamar"
        ];

        const rows = students.map(s => [
          s.nama || "", 
          s.nis || "", 
          s.progres_1s || "", 
          s.tahfizh_detail || (s.tahfizh_juz ? `${s.tahfizh_juz} Juz` : "0 Juz"), 
          s.ibadah || "", 
          s.disiplin || "", 
          s.sosial || "", 
          s.prestasi || "", 
          s.fokus || "", 
          s.pesan_wali || ""
        ]);

        const escapeCSV = (val) => {
          if (val === undefined || val === null) return '';
          let str = String(val).replace(/"/g, '""');
          if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"') || str.includes(';')) {
            return `"${str}"`;
          }
          return str;
        };

        const csvContent = "\uFEFF" + [
          headers.join(";"),
          ...rows.map(r => r.map(escapeCSV).join(";"))
        ].join("\n");

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);

      const parseCSVRow = (text, delim) => {
        let result = [];
        let start = 0;
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          if (text[i] === '"') {
            inQuotes = !inQuotes;
          } else if (text[i] === delim && !inQuotes) {
            let value = text.substring(start, i).trim();
            if (value.startsWith('"') && value.endsWith('"')) {
              value = value.substring(1, value.length - 1).replace(/""/g, '"');
            }
            result.push(value);
            start = i + 1;
          }
        }
        let value = text.substring(start).trim();
        if (value.startsWith('"') && value.endsWith('"')) {
          value = value.substring(1, value.length - 1).replace(/""/g, '"');
        }
        result.push(value);
        return result;

                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2.5 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.pesan_wali.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.pesan_wali} onChange={(e) => setEditingStudent({...editingStudent, pesan_wali: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                </div>
                
                <div className="flex justify-end gap-2 pt-4 border-t">
                  <button onClick={() => setEditingStudent(null)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                  <button onClick={() => handleSaveStudent(editingStudent)} className="px-5 py-2 text-xs font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Simpan Perubahan</button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL UPLOAD SPREADSHEET / EXCEL / CSV */}
          {showImportModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6 space-y-4">
                <div className="flex justify-between items-start border-b pb-2">
                  <div>
                    <h3 className="text-sm font-black text-[#2b3990]">📤 Upload Data Rapor (Excel / CSV)</h3>
                    <p className="text-[11px] text-slate-500 mt-0.5">Mendukung unggahan file CSV atau salin & tempel tabel secara langsung dari Excel.</p>
                  </div>
                  <button onClick={getTemplateTSV} className="text-[10px] bg-indigo-50 hover:bg-indigo-100 text-[#2b3990] font-black px-3 py-1.5 rounded-lg transition border border-indigo-100">Ambil Template Teks</button>
                </div>
                
                {/* File Picker */}
                <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition cursor-pointer relative">
                  <input 
                    type="file" 
                    accept=".csv,.tsv,.txt" 
                    onChange={handleFileUpload} 
                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                  />
                  <span className="text-xs font-bold text-slate-700">📁 Klik untuk memilih File Excel / CSV (.csv)</span>
                  <p className="text-[10px] text-slate-400 mt-1">Atau tempel baris data Excel secara manual pada kolom teks di bawah:</p>
                </div>

                <textarea 
                  placeholder="Tempel baris spreadsheet atau edit isi file CSV di sini..." 
                  value={bulkImportText} 
                  onChange={(e) => setBulkImportText(e.target.value)} 
                  className="w-full h-48 p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-[10px] font-mono resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                />
                
                <div className="flex justify-between items-center pt-4 border-t">
                  <span className="text-[10px] text-slate-400 font-medium">Wajib menggunakan baris tajuk kolom yang sesuai dengan template.</span>
                  <div className="flex gap-1.5">
                    <button onClick={() => setShowImportModal(false)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                    <button onClick={handleImportTSV} className="px-4 py-2 text-xs font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Proses & Upload</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL DIALOG NOTIFIKASI */}
          {alertConfig && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4 text-center border">
                <div className="w-12 h-12 rounded-full bg-slate-50 text-[#2b3990] flex items-center justify-center mx-auto text-lg shadow-inner">
                  {alertConfig.type === 'confirm' ? '❓' : '💡'}
                </div>
                <div>
                  <h3 className="text-sm font-extrabold text-slate-900">{alertConfig.title}</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed">{alertConfig.message}</p>
                </div>
                <div className="flex justify-center gap-1.5 pt-2">
                  {alertConfig.type === 'confirm' && (
                    <button onClick={() => setAlertConfig(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs uppercase rounded-xl transition">Batal</button>
                  )}
                  <button onClick={() => { if (alertConfig.type === 'confirm' && alertConfig.onConfirm) alertConfig.onConfirm(); setAlertConfig(null); }} className="px-5 py-2.5 bg-[#2b3990] hover:bg-[#1f2a70] text-white font-bold text-xs uppercase rounded-xl shadow transition">Setuju</button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-slate-900 text-slate-400 py-4 text-center text-xs print:hidden border-t border-slate-800">
            <p>© 2026 MALIKA ISLAMIC BOARDING SCHOOL • Tangerang, Banten</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />); 
  </script>
</body>
</html>
