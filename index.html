      // --- PROTOKOL FIREBASE AUTH & SIGN IN ---
      useEffect(() => {
        if (!auth) {
          setAuthLoading(false);
          return;
        }
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Autentikasi Firebase Gagal:", error);
            setAuthLoading(false);
          }
        };
        initAuth();
        const unsubscribe = auth.onAuthStateChanged((usr) => {
          setUser(usr);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // --- SINKRONISASI REAL-TIME DATA SANTRIWATI ---
      useEffect(() => {
        if (!user || !db) return;

        // Strict Path sesuai RULE 1 menggunakan model Firebase Compat Pathing
        const studentsCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
        
        // Membuka listener real-time (onSnapshot) dengan error callback
        const unsubscribe = studentsCol.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });

          if (list.length === 0) {
            // Seeding otomatis data default awal jika cloud kosong
            initialStudents.forEach(async (s) => {
              await studentsCol.doc(s.id).set(s);
            });
          } else {
            // Urutkan berdasarkan nomor NIS
            list.sort((a, b) => {
              const numA = parseInt(a.nis.replace(/\D/g, '')) || 0;
              const numB = parseInt(b.nis.replace(/\D/g, '')) || 0;
              return numA - numB;
            });
            setStudents(list);
          }
        }, (error) => {
          console.error("Firestore error santriwati:", error);
        });

        return () => unsubscribe();
      }, [user]);

      // --- SINKRONISASI REAL-TIME PENGATURAN GLOBAL ---
      useEffect(() => {
        if (!user || !db) return;

        const settingsDoc = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global');
        
        const unsubscribe = settingsDoc.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.semester) setGlobalSemester(data.semester);
            if (data.tanggal) setGlobalTanggal(data.tanggal);
            if (data.waliKelas) setGlobalWaliKelas(data.waliKelas);
            if (data.waliKamar) setGlobalWaliKamar(data.waliKamar);
            if (data.jabatanKS) setGlobalJabatanKS(data.jabatanKS);
            if (data.namaKS) setGlobalNamaKS(data.namaKS);
          } else {
            // Seeding default setting di awan
            settingsDoc.set({
              semester: "Ganjil 2025/2026",
              tanggal: "19 Desember 2025",
              waliKelas: "Ustadzah Maulana Azka, S.Pd.",

        return () => unsubscribe();

        if (!user || !db) return;
        try {

      const filteredOptionStudents = useMemo(() => {
        return students.filter(student => 
          student.nama.toLowerCase().includes(reportSearchQuery.toLowerCase()) || 
          student.nis.toLowerCase().includes(reportSearchQuery.toLowerCase())

      const selectedStudent = students.find(s => String(s.id) === String(selectedStudentId)) || students[0] || null;
      const currentIndex = students.findIndex(s => String(s.id) === String(selectedStudentId));

      const triggerAlert = (message, title = "Informasi") => {
        setAlertConfig({ type: 'alert', title, message });
      };

      const triggerConfirm = (message, onConfirm, title = "Konfirmasi Tindakan") => {
        setAlertConfig({ type: 'confirm', title, message, onConfirm });

      // Navigasi santri sebelumnya/berikutnya
      const handlePrev = () => {
        if (students.length === 0) return;
        if (currentIndex > 0) {
          setSelectedStudentId(students[currentIndex - 1].id);
        } else {
          setSelectedStudentId(students[students.length - 1].id);
        }
      };

      const handleNext = () => {
        if (students.length === 0) return;
        if (currentIndex < students.length - 1) {
          setSelectedStudentId(students[currentIndex + 1].id);
        } else {
          setSelectedStudentId(students[0].id);
        }
      };

      // Menyimpan data santriwati langsung ke database cloud
      const handleSaveStudent = async (studentData) => {
        if (!user || !db) {
          triggerAlert("Gagal terhubung ke database awan.", "Koneksi Terputus");
          return;
        }

        const studentId = isAddingNew ? Date.now().toString() : studentData.id;
        const updatedPayload = {
          ...studentData,
          id: studentId,
          sas: Number(studentData.sas) || 80,
          sat: Number(studentData.sat) || 80,
          tahfizh_juz: Number(studentData.tahfizh_juz) || 0
        };

        try {
          const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(studentId);
          await studentDocRef.set(updatedPayload);
          
          setSelectedStudentId(studentId);
          setEditingStudent(null);
          setIsAddingNew(false);
          triggerAlert(`Data rapor ananda ${studentData.nama} berhasil disimpan!`, "Sukses Menyimpan");
        } catch (err) {
          console.error("Gagal menyimpan ke cloud:", err);
          triggerAlert("Gagal menyimpan data ke awan. Silakan coba kembali.", "Eror");
        }
      };

      // Menghapus data santriwati dari database cloud
      const handleDeleteStudent = (id, name) => {
        triggerConfirm(`Apakah Anda yakin ingin menghapus data santriwati "${name}" secara permanen dari database cloud?`, async () => {
          if (!user || !db) return;
          try {
            const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id);
            await studentDocRef.delete();
            triggerAlert("Data santriwati berhasil dihapus dari cloud.", "Sukses Terhapus");
            // Kembalikan pilihan ke siswa pertama jika ada
            if (students.length > 1) {
              const nextValid = students.find(s => s.id !== id);
              if (nextValid) setSelectedStudentId(nextValid.id);
            }
          } catch (err) {
            console.error("Gagal menghapus:", err);
            triggerAlert("Gagal menghapus data dari cloud.", "Eror");
          }
        });
      };

      // Ekspor ke CSV / Excel-ready format
      const handleDownloadExcel = () => {
        if (students.length === 0) {
          triggerAlert("Tidak ada data siswa untuk diunduh.", "Data Kosong");
          return;
        }

        const headers = [
          "Nama Lengkap", "NIS/Kelas", "Nilai SAS (Ganjil)", "Nilai SAT (Genap)", 
          "Hasil Psikotes", "Progres 1 Semester", "Mapel Unggul", "Mapel Perlu Peningkatan", 
          "Observasi Ibadah Harian", "Tahfizh (Juz)", "Keterangan Tahfizh", "Sikap dan Disiplin", 
          "Sosial dan Kepemimpinan", "Prestasi Non-Akademik", "Fokus Kelas Selanjutnya", "Pesan Wali Kelas"
        ];

        const rows = students.map(s => [
          s.nama || "", s.nis || "", s.sas || 80, s.sat || 80, s.psikotes || "", s.progres_1s || "",
          s.mapel_unggul || "", s.mapel_perlu || "", s.ibadah || "", s.tahfizh_juz || 0, s.tahfizh_detail || "",
          s.disiplin || "", s.sosial || "", s.prestasi || "", s.fokus || "", s.pesan_wali || ""
        ]);

        const escapeCSV = (val) => {
          if (val === undefined || val === null) return '';
          let str = String(val).replace(/"/g, '""');
          if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"') || str.includes(';')) {
            return `"${str}"`;
          }
          return str;
        };

        const csvContent = "\uFEFF" + [
          headers.join(";"),
          ...rows.map(r => r.map(escapeCSV).join(";"))
        ].join("\n");

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `database_rapor_malika_${globalSemester.replace(/[\/\s]/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

        const dummyRow = "Aira Fitriani Azzahra\tNIS-001/7 A\t85\t90\tPotensi kognitif logis yang sangat unggul.\tMengalami kemajuan signifikan di kelas.\tMatematika, IPA\tBahasa Inggris\tSangat rajin shalat berjamaah dan ramah.\t4\t4 Juz lancar\tSangat disiplin dan taat.\tMemiliki pengaruh kepemimpinan yang baik.\tJuara 2 Memanah\tFokus pada kematangan tata bahasa arab.\tPertahankan prestasimu nak!";
        
        setBulkImportText(`${headers}\n${dummyRow}`);
        triggerAlert("Template berhasil dimuat di kolom teks di bawah! Anda bisa menyalinnya ke Excel/Sheets untuk diisi, lalu klik 'Proses & Impor'.", "Template Berhasil Dimuat");
      };

      // Proses Impor Data TSV langsung diunggah ke Database Cloud
      const handleImportTSV = async () => {
        if (!user || !db) return;
        try {
          const lines = bulkImportText.trim().split("\n");
          if (lines.length < 2) {
            triggerAlert("Mohon masukkan data berformat spreadsheet (minimal terdapat baris tajuk dan satu baris data).", "Gagal Impor");
            return;
          }
          
          const headers = lines[0].toLowerCase().split("\t").map(h => h.trim());
          const newStudents = [];

          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const cols = lines[i].split("\t").map(c => c.trim());
            const rowObj = {};
            
            headers.forEach((header, index) => {
              let key = header;
              if (header.includes("nama")) key = "nama";
              else if (header.includes("nis") || header.includes("kelas")) key = "nis";
              else if (header.includes("sas") || header.includes("ganjil") || header.includes("ats")) key = "sas";
              else if (header.includes("sat") || header.includes("genap")) key = "sat";
              else if (header.includes("psikotes")) key = "psikotes";
              else if (header.includes("progres")) key = "progres_1s";
              else if (header.includes("unggul")) key = "mapel_unggul";
              else if (header.includes("perlu")) key = "mapel_perlu";
              else if (header.includes("ibadah")) key = "ibadah";
              else if (header.includes("tahfizh_juz") || header.includes("juz")) key = "tahfizh_juz";
              else if (header.includes("tahfizh_detail") || header.includes("keterangan tahfizh")) key = "tahfizh_detail";
              else if (header.includes("disiplin") || header.includes("sikap")) key = "disiplin";
              else if (header.includes("sosial") || header.includes("interaksi")) key = "sosial";
              else if (header.includes("prestasi")) key = "prestasi";
              else if (header.includes("fokus")) key = "fokus";
              else if (header.includes("pesan")) key = "pesan_wali";

              rowObj[key] = cols[index];
            });

            const studentId = (Date.now() + i).toString();
            rowObj.id = studentId;
            rowObj.sas = Number(rowObj.sas) || 80;
            rowObj.sat = Number(rowObj.sat) || 80;
            rowObj.tahfizh_juz = Number(rowObj.tahfizh_juz) || 0;
            rowObj.nama = rowObj.nama || "Santriwati Baru " + i;
            rowObj.nis = rowObj.nis || "NIS-xxx";
            rowObj.psikotes = rowObj.psikotes || "Potensi dasar kognitif baik.";
            rowObj.progres_1s = rowObj.progres_1s || "Berkembang sesuai harapan.";
            rowObj.mapel_unggul = rowObj.mapel_unggul || "Fiqih";
            rowObj.mapel_perlu = rowObj.mapel_perlu || "Matematika";
            rowObj.ibadah = rowObj.ibadah || "Tertib ibadah wajib.";
            rowObj.tahfizh_detail = rowObj.tahfizh_detail || `${rowObj.tahfizh_juz} Juz`;
            rowObj.disiplin = rowObj.disiplin || "Menunjukkan sikap disiplin yang baik.";
            rowObj.sosial = rowObj.sosial || "Mampu berinteraksi secara kooperatif.";
            rowObj.prestasi = rowObj.prestasi || "-";
            rowObj.fokus = rowObj.fokus || "Tingkatkan konsentrasi belajar.";
            rowObj.pesan_wali = rowObj.pesan_wali || "Pertahankan semangatmu dalam belajar.";

            newStudents.push(rowObj);
          }

          // Menyimpan setiap data baru ke Firestore
          for (const s of newStudents) {
            const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(s.id);
            await studentDocRef.set(s);
          }

          setShowImportModal(false);
          setBulkImportText("");
          triggerAlert(`Berhasil mengimpor ${newStudents.length} data santriwati ke database cloud!`, "Impor Sukses");
        } catch (err) {
          console.error("Gagal impor TSV ke cloud:", err);
          triggerAlert("Gagal memproses data impor ke database cloud.", "Kesalahan");
        }
      };

        if (!student || !student.sas) return { percent: "0", positive: true };
        const diff = student.sat - student.sas;
        const percent = ((diff / student.sas) * 100).toFixed(1);
        return { percent: Math.abs(percent), positive: diff >= 0 };

                {authLoading ? (
                  <>
                    <span className="w-2 h-2 rounded-full bg-amber-400 animate-ping"></span>
                    <span className="text-amber-200">Menghubungkan Database...</span>
                  </>
                ) : user ? (
                  <>
                    <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                    <span className="text-emerald-400">Awan Terhubung</span>
                  </>
                ) : (
                  <>
                    <span className="w-2 h-2 rounded-full bg-rose-400"></span>
                    <span className="text-rose-300">Mode Lokal</span>

          </header>

          {/* Area Konten Utama */}
          <div className="flex-grow max-w-4xl mx-auto w-full p-4 print:p-0">

            {/* PANEL PENGATURAN GLOBAL (Dapat dilipat dengan 1 klik pada header) */}

                <h4 className="text-xs font-black text-slate-700 uppercase tracking-wider flex items-center gap-1.5">
                  <svg className="w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>

                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.sosial.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.sosial} onChange={(e) => setEditingStudent({...editingStudent, sosial: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Prestasi Non-Akademik */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Prestasi Non-Akademik</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, prestasi: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.prestasi.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <input type="text" value={editingStudent.prestasi} onChange={(e) => setEditingStudent({...editingStudent, prestasi: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Fokus Kelas Selanjutnya */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Fokus Kelas Selanjutnya</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, fokus: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.fokus.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.fokus} onChange={(e) => setEditingStudent({...editingStudent, fokus: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Pesan Wali Kelas & Wali Kamar */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Pesan Wali Kelas & Wali Kamar</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, pesan_wali: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2.5 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.pesan_wali.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.pesan_wali} onChange={(e) => setEditingStudent({...editingStudent, pesan_wali: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                </div>
                
                <div className="flex justify-end gap-2 pt-4 border-t">
                  <button onClick={() => setEditingStudent(null)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                  <button onClick={() => handleSaveStudent(editingStudent)} className="px-5 py-2 text-xs font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Simpan Perubahan</button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL IMPOR SPREADSHEET */}
          {showImportModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6 space-y-4">
                <div className="flex justify-between items-start border-b pb-2">
                  <div>
                    <h3 className="text-sm font-bold text-[#2b3990]">📥 Impor Massal dari Spreadsheet</h3>
                    <p className="text-[11px] text-slate-500 mt-0.5">Salin dan tempel data berformat tab-separated dari Google Sheets / Excel.</p>
                  </div>
                  <button onClick={getTemplateTSV} className="text-[10px] bg-indigo-50 hover:bg-indigo-100 text-[#2b3990] font-black px-3 py-1.5 rounded-lg transition border border-indigo-100">Ambil Template</button>
                </div>
                
                <textarea 
                  placeholder="Tempel baris spreadsheet Anda di sini..." 
                  value={bulkImportText} 
                  onChange={(e) => setBulkImportText(e.target.value)} 
                  className="w-full h-64 p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-[10px] font-mono resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                />
                
                <div className="flex justify-between items-center pt-4 border-t">
                  <span className="text-[10px] text-slate-400">Pastikan baris pertama berisi nama tajuk kolom yang sesuai.</span>
                  <div className="flex gap-1.5">
                    <button onClick={() => setShowImportModal(false)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                    <button onClick={handleImportTSV} className="px-4 py-2 text-xs font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Proses & Impor</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL DIALOG NOTIFIKASI */}
          {alertConfig && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4 text-center border">
                <div className="w-12 h-12 rounded-full bg-slate-50 text-[#2b3990] flex items-center justify-center mx-auto text-lg shadow-inner">
                  {alertConfig.type === 'confirm' ? '❓' : '💡'}
                </div>
                <div>
                  <h3 className="text-sm font-extrabold text-slate-900">{alertConfig.title}</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed">{alertConfig.message}</p>
                </div>
                <div className="flex justify-center gap-1.5 pt-2">
                  {alertConfig.type === 'confirm' && (
                    <button onClick={() => setAlertConfig(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs uppercase rounded-xl transition">Batal</button>
                  )}
                  <button onClick={() => { if (alertConfig.type === 'confirm' && alertConfig.onConfirm) alertConfig.onConfirm(); setAlertConfig(null); }} className="px-5 py-2.5 bg-[#2b3990] hover:bg-[#1f2a70] text-white font-bold text-xs uppercase rounded-xl shadow transition">Setuju</button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-slate-900 text-slate-400 py-4 text-center text-xs print:hidden border-t border-slate-800">
            <p>© 2026 MALIKA ISLAMIC BOARDING SCHOOL • Tangerang, Banten</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />); 
  </script>
</body>
</html>
